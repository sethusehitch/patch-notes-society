<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Patch Notes for Society</title>
  <desc id="desc">A civic systems project about public problems, incentives, tradeoffs, and upgrades.</desc>
  <rect width="1200" height="630" fill="#f7f8fa"/>
  <rect x="72" y="70" width="1056" height="490" rx="18" fill="#ffffff" stroke="#d9e0e8" stroke-width="2"/>
  <rect x="72" y="70" width="14" height="490" fill="#0f766e"/>
  <text x="128" y="148" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800" letter-spacing="2">A CIVIC SYSTEMS PROJECT</text>
  <text x="128" y="252" fill="#18212f" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="850">Patch Notes</text>
  <text x="128" y="344" fill="#18212f" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="850">for Society</text>
  <text x="128" y="420" fill="#354255" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500">History, incentives, tradeoffs, metrics,</text>
  <text x="128" y="465" fill="#354255" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="500">migration plans, and public critique.</text>
  <g transform="translate(128 512)">
    <rect width="154" height="38" rx="19" fill="#eef8f7"/>
    <text x="20" y="26" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">10 v0.1 issues</text>
    <rect x="176" width="154" height="38" rx="19" fill="#f1f5f9"/>
    <text x="198" y="26" fill="#475569" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">review wanted</text>
  </g>
</svg>
